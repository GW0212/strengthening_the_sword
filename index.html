<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>검 강화하기 — Flash Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <script>
    (function() {
      const onReady = () => {
        if (!window.RufflePlayer) {
          const s = document.createElement('script');
          s.src = "https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle";
          document.head.appendChild(s);
        }
      };
      document.readyState === "loading"
        ? document.addEventListener("DOMContentLoaded", onReady)
        : onReady();
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="scanlines" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="particles" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="layout">

    <aside class="sidebar">
      <div class="logo-block">
        <div class="logo-text">
          <span class="logo-title">검</span>
          <span class="logo-title accent">강화하기</span>
        </div>
      </div>

      <nav class="controls">
        <p class="controls-label">CONTROLS</p>

        <button id="btnReload" class="ctrl-btn">
          <span class="ctrl-icon">↺</span>
          <span class="ctrl-text">다시 로드</span>
        </button>

        <button id="btnFullscreen" class="ctrl-btn">
          <span class="ctrl-icon">⛶</span>
          <span class="ctrl-text">전체화면</span>
        </button>

        <label class="ctrl-btn file-label" for="fileInput">
          <span class="ctrl-icon">⊕</span>
          <span class="ctrl-text">SWF 열기</span>
          <input id="fileInput" type="file" accept=".swf" />
        </label>
      </nav>

    </aside>

    <main class="main">

      <div class="topbar">
        <div class="topbar-left">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">초기화 중...</span>
        </div>
      </div>

      <div class="stage-wrap">
        <div class="stage-corner tl"></div>
        <div class="stage-corner tr"></div>
        <div class="stage-corner bl"></div>
        <div class="stage-corner br"></div>

        <div id="stage" class="stage" aria-label="게임 무대" tabindex="0"></div>

        <div class="drop-overlay" id="dropOverlay" aria-hidden="true"></div>
      </div>

      <div class="bottombar">
        <details class="faq-inline">
          <summary>실행 안 될 때</summary>
          <div class="faq-body">
            <p><b>파일 경로</b> — <code>assets/검 강화하기.swf</code>가 같은 폴더에 있는지 확인</p>
            <p><b>정적 서버</b> — <code>file://</code> 프로토콜은 WASM 로드를 차단할 수 있음. <code>python -m http.server</code> 또는 VSCode Live Server로 실행</p>
            <p><b>강력 새로고침</b> — Ctrl+F5 또는 캐시 비우기 후 재시도</p>
          </div>
        </details>
      </div>

    </main>
  </div>

  <script>
    const stage         = document.getElementById('stage');
    const fileInput     = document.getElementById('fileInput');
    const btnReload     = document.getElementById('btnReload');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const dropOverlay   = document.getElementById('dropOverlay');
    const statusDot     = document.getElementById('statusDot');
    const statusText    = document.getElementById('statusText');

    let rufflePlayer;
    let currentSrc = "assets/\uac80 \uac15\ud654\ud558\uae30.swf";

    function setStatus(state, msg) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = msg;
    }

    function escapeHtml(s) {
      return s
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;");
    }

    function createPlayer() {
      stage.innerHTML = "";
      setStatus('loading', '로딩 중...');

      const ruffle = window.RufflePlayer?.newest?.();
      if (!ruffle) {
        stage.innerHTML = `
          <div class="error-state">
            <div class="error-code">ERR_RUFFLE_NOT_READY</div>
            <p>Ruffle 엔진을 초기화하는 중입니다.<br/>잠시 후 다시 시도해주세요.</p>
            <button class="retry-btn" onclick="createPlayer()">재시도</button>
          </div>`;
        setStatus('error', 'Ruffle 미준비');
        return;
      }

      rufflePlayer = ruffle.createPlayer();
      rufflePlayer.style.cssText = "width:100%;height:100%;display:block;";
      stage.appendChild(rufflePlayer);

      rufflePlayer.load(currentSrc)
        .then(() => setStatus('ok', '실행 중'))
        .catch(err => {
          console.error(err);
          stage.innerHTML = `
            <div class="error-state">
              <div class="error-code">ERR_SWF_LOAD_FAILED</div>
              <p>SWF 파일을 불러올 수 없습니다.<br/>경로와 서버 구동 여부를 확인하세요.</p>
              <code class="error-detail">${escapeHtml(String(err))}</code>
              <button class="retry-btn" onclick="createPlayer()">재시도</button>
            </div>`;
          setStatus('error', '로드 실패');
        });
    }

    fileInput.addEventListener('change', e => {
      const file = e.target.files?.[0];
      if (!file) return;
      currentSrc = URL.createObjectURL(file);
      createPlayer();
    });

    const stageWrap = document.querySelector('.stage-wrap');
    stageWrap.addEventListener('dragover', e => {
      e.preventDefault();
      dropOverlay.classList.add('visible');
    });
    stageWrap.addEventListener('dragleave', e => {
      if (!stageWrap.contains(e.relatedTarget)) dropOverlay.classList.remove('visible');
    });
    stageWrap.addEventListener('drop', e => {
      e.preventDefault();
      dropOverlay.classList.remove('visible');
      const file = e.dataTransfer?.files?.[0];
      if (file?.name.toLowerCase().endsWith('.swf')) {
        currentSrc = URL.createObjectURL(file);
        createPlayer();
      }
    });

    btnReload.addEventListener('click', () => createPlayer());

    btnFullscreen.addEventListener('click', () => {
      if (!rufflePlayer) return;
      if (typeof rufflePlayer.enterFullscreen === 'function') rufflePlayer.enterFullscreen();
      else if (rufflePlayer.requestFullscreen) rufflePlayer.requestFullscreen();
      else stage.requestFullscreen?.();
    });

    stage.addEventListener('click', () => stage.focus());
    document.addEventListener('DOMContentLoaded', createPlayer);
  </script>
</body>
</html>
